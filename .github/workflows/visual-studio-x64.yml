name: Visual Studio x64

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4.1.7
        with:
          submodules: recursive

      - name: Set up Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Install Vulkan SDK tools
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true

      - name: Configure build for amd64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake (x64)
        run: cmake --preset vs-x64 -DRENODX_ENABLE_SPIRV_VALIDATION=OFF -DRENODX_ENABLE_SPIRV_DISASSEMBLY=OFF

      - name: Build (x64)
        run: cmake --build --preset vs-x64-release --verbose
